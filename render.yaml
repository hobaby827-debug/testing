services:
  - type: web
    name: arhl-website
    runtime: node
    buildCommand: "pnpm install && pnpm --filter @workspace/arhl-website run build && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: NEON_DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
