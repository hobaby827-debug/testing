kind = "web"
previewPath = "/"
title = "ARHL - American Roblox Hockey League"
version = "1.0.0"
id = "artifacts/arhl-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20454

[services.development]
run = "pnpm --filter @workspace/arhl-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arhl-website", "run", "build" ]
publicDir = "artifacts/arhl-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20454"
BASE_PATH = "/"
